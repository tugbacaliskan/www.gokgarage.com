<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="60%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#060606"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="62%" cy="48%" r="50%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.14"/>
      <stop offset="60%" style="stop-color:#c9a84c;stop-opacity:0.03"/>
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="leftGlow" cx="0%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C8000B;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#C8000B;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#c9a84c;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#c9a84c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#f0d080;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a07a20;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#333"/>
      <stop offset="50%" style="stop-color:#c9a84c;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="30" flood-color="#c9a84c" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Arka plan -->
  <rect width="1440" height="900" fill="url(#bg2)"/>
  <rect width="1440" height="900" fill="url(#centerGlow)"/>
  <rect width="1440" height="900" fill="url(#leftGlow)"/>

  <!-- İnce yatay çizgiler (texture) -->
  <g opacity="0.025">
    <rect x="0" y="0" width="1440" height="1" fill="#ffffff"/>
    <rect x="0" y="60" width="1440" height="1" fill="#ffffff"/>
    <rect x="0" y="120" width="1440" height="1" fill="#ffffff"/>
    <rect x="0" y="180" width="1440" height="1" fill="#ffffff"/>
    <rect x="0" y="240" width="1440" height="1" fill="#ffffff"/>
    <rect x="0" y="300" width="1440" height="1" fill="#ffffff"/>
    <rect x="0" y="360" width="1440" height="1" fill="#ffffff"/>
    <rect x="0" y="420" width="1440" height="1" fill="#ffffff"/>
    <rect x="0" y="480" width="1440" height="1" fill="#ffffff"/>
    <rect x="0" y="540" width="1440" height="1" fill="#ffffff"/>
    <rect x="0" y="600" width="1440" height="1" fill="#ffffff"/>
    <rect x="0" y="660" width="1440" height="1" fill="#ffffff"/>
    <rect x="0" y="720" width="1440" height="1" fill="#ffffff"/>
    <rect x="0" y="780" width="1440" height="1" fill="#ffffff"/>
    <rect x="0" y="840" width="1440" height="1" fill="#ffffff"/>
  </g>

  <!-- Sağda büyük dekoratif direksiyon/jant çemberi -->
  <!-- Dış çember -->
  <circle cx="980" cy="450" r="310" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.12"/>
  <circle cx="980" cy="450" r="290" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.08"/>

  <!-- Jant kolları -->
  <g opacity="0.18" stroke="#c9a84c" stroke-width="2">
    <line x1="980" y1="160" x2="980" y2="740"/>
    <line x1="690" y1="450" x2="1270" y2="450"/>
    <line x1="784" y1="244" x2="1176" y2="656"/>
    <line x1="1176" y1="244" x2="784" y2="656"/>
    <!-- 45 derece daha -->
    <line x1="857" y1="175" x2="1103" y2="725"/>
    <line x1="1103" y1="175" x2="857" y2="725"/>
    <line x1="705" y1="323" x2="1255" y2="577"/>
    <line x1="1255" y1="323" x2="705" y2="577"/>
  </g>

  <!-- İç jant çemberleri -->
  <circle cx="980" cy="450" r="180" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.15"/>
  <circle cx="980" cy="450" r="80" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.2"/>
  <!-- Merkez göbek -->
  <circle cx="980" cy="450" r="30" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.35"/>
  <circle cx="980" cy="450" r="12" fill="#c9a84c" opacity="0.25"/>

  <!-- Altın parıltı efekti -->
  <circle cx="980" cy="450" r="310" fill="none" stroke="url(#goldLine)" stroke-width="2" opacity="0.5" filter="url(#glow)"/>

  <!-- Sol metin alanı -->
  <!-- Üst dekor çizgisi -->
  <line x1="120" y1="270" x2="240" y2="270" stroke="#c9a84c" stroke-width="2" opacity="0.8"/>
  <line x1="245" y1="270" x2="265" y2="270" stroke="#C8000B" stroke-width="2" opacity="0.6"/>

  <!-- Eyebrow -->
  

  <!-- Ana başlık -->
  
  
  
  

  <!-- Ayraç -->
  <rect x="120" y="636" width="80" height="2" fill="#c9a84c" rx="1" opacity="0.8"/>
  <rect x="208" y="636" width="12" height="2" fill="#C8000B" rx="1" opacity="0.7"/>

  <!-- Alt metin -->
  

  <!-- Stat kutucukları -->
  <g transform="translate(120, 706)">
    <!-- Kutu 1 -->
    <rect x="0" y="0" width="130" height="64" rx="8" fill="rgba(201,168,76,0.1)" stroke="#c9a84c" stroke-width="1" opacity="0.7"/>
    
    

    <!-- Kutu 2 -->
    <rect x="146" y="0" width="130" height="64" rx="8" fill="rgba(200,0,11,0.1)" stroke="#C8000B" stroke-width="1" opacity="0.7"/>
    
    

    <!-- Kutu 3 -->
    <rect x="292" y="0" width="130" height="64" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    
    
  </g>

  <!-- Alt çizgi -->
  <line x1="0" y1="862" x2="1440" y2="862" stroke="url(#goldLine)" stroke-width="1" opacity="0.4"/>

  <!-- Sağ alt imza -->
  
</svg>